<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KANNI · Admin</title>
<style>
  :root{
    --accent:#16a34a; --accent-d:#15803d; --accent-l:#ecfdf3; --accent-r:#dcfce7;
    --ink:#0b1524; --body:#334155; --muted:#8a97a8; --faint:#aab4c2;
    --line:#e9edf2; --line-2:#f1f4f8; --bg:#f7f8fa; --card:#fff;
    --amber:#b45309; --amber-l:#fffbeb; --amber-r:#fef3c7;
    --red:#e11d48; --red-l:#fff1f2; --red-r:#ffe4e6; --blue:#2563eb;
    --sh:0 1px 2px rgba(16,24,40,.05); --sh-md:0 4px 16px rgba(16,24,40,.08);
    --sh-lg:0 16px 48px rgba(16,24,40,.16); --r:12px; --side:256px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
    -webkit-font-smoothing:antialiased;letter-spacing:-.05px}
  svg{display:block;flex:0 0 auto}
  .nav-item>svg{width:18px;height:18px} .kpi .ic svg{width:18px;height:18px}
  .searchbox svg{width:16px;height:16px} .empty .big svg{width:22px;height:22px}
  .avatar{flex:0 0 auto}
  button{font:inherit;cursor:pointer;border:0;border-radius:9px;padding:8px 14px;font-weight:600;
    background:var(--accent);color:#fff;transition:filter .15s,background .15s,box-shadow .15s;white-space:nowrap}
  button:hover{filter:brightness(1.04)} button:active{filter:brightness(.97)}
  button:disabled{opacity:.5;cursor:default;filter:none}
  button.ghost{background:#fff;color:var(--body);border:1px solid var(--line);box-shadow:var(--sh)}
  button.ghost:hover{background:#fafbfc;filter:none}
  button.danger{background:var(--red)} button.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
  button.icon{padding:8px;background:#fff;color:var(--body);border:1px solid var(--line);box-shadow:var(--sh)}
  input,select{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%}
  input::placeholder{color:var(--faint)}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3.5px var(--accent-r)}
  label{font-size:12px;font-weight:600;color:var(--body);display:block;margin-bottom:6px}
  h1,h2,h3{margin:0} code{background:var(--line-2);padding:2px 7px;border-radius:6px;font-size:12.5px}

  /* ---- Login ---- */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(900px 460px at 50% -8%, #e9f8ef 0%, var(--bg) 55%)}
  .login-card{width:100%;max-width:392px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:34px 32px;box-shadow:var(--sh-lg)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;
    display:grid;place-items:center;box-shadow:0 4px 12px rgba(22,163,74,.35)}
  .login-card h1{font-size:21px;margin:20px 0 5px;letter-spacing:-.4px}
  .login-card .sub{color:var(--muted);margin-bottom:24px;font-size:13.5px}
  .field{margin-bottom:14px}
  .login-card button[type=submit]{width:100%;padding:12px;font-size:14.5px;margin-top:6px}
  .err{color:var(--red);font-size:13px;margin-top:11px;min-height:17px}
  details.adv{margin-top:20px;border-top:1px solid var(--line);padding-top:15px}
  details.adv summary{cursor:pointer;color:var(--muted);font-size:12px;list-style:none}
  details.adv summary::-webkit-details-marker{display:none}
  .adv .row{display:flex;gap:8px;margin-top:9px}

  /* ---- Shell ---- */
  .app{display:none;min-height:100vh}
  .app.show{display:grid;grid-template-columns:var(--side) 1fr}
  .sidebar{background:#fff;border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;gap:3px}
  .sidebar .brand{padding:6px 10px 20px}
  .nav-sec{font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--faint);
    padding:14px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--body);
    font-weight:550;cursor:pointer;transition:background .14s,color .14s}
  .nav-item svg{color:var(--muted);transition:color .14s;flex:0 0 auto}
  .nav-item:hover{background:var(--line-2)} .nav-item:hover svg{color:var(--body)}
  .nav-item.active{background:var(--accent-l);color:var(--accent-d)}
  .nav-item.active svg{color:var(--accent)}
  .nav-badge{margin-left:auto;background:var(--amber-r);color:var(--amber);font-size:11px;font-weight:800;
    min-width:20px;height:19px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
  .side-foot{margin-top:auto;display:flex;align-items:center;gap:9px;padding:10px;border-top:1px solid var(--line-2);color:var(--muted);font-size:12px}

  main{min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:6;background:rgba(247,248,250,.8);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:0 30px;height:62px;display:flex;align-items:center;gap:14px}
  .topbar h2{font-size:18px;letter-spacing:-.3px}
  .topbar .sub{color:var(--muted);font-size:12.5px;font-weight:500;margin-top:1px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .whoami{display:flex;align-items:center;gap:9px;padding-left:6px}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-d));
    color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
  .whoami .nm{font-size:13px;font-weight:600} .whoami .rl{font-size:11px;color:var(--muted)}
  .content{padding:26px 30px 70px;max-width:1180px;width:100%}

  /* ---- Cards / KPI ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
  .card.pad{padding:20px} .card+.card{margin-top:16px}
  .sec-title{font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);margin:26px 2px 12px}
  .sec-title:first-child{margin-top:4px}
  .grid{display:grid;gap:14px}
  .k4{grid-template-columns:repeat(4,1fr)} .k3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:900px){.k4,.k3{grid-template-columns:repeat(2,1fr)} .app.show{grid-template-columns:1fr} .sidebar{display:none}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;box-shadow:var(--sh)}
  .kpi .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--accent-l);color:var(--accent);margin-bottom:13px}
  .kpi.amber .ic{background:var(--amber-l);color:var(--amber)} .kpi.blue .ic{background:#eff6ff;color:var(--blue)}
  .kpi .n{font-size:24px;font-weight:800;letter-spacing:-.6px;line-height:1}
  .kpi .l{color:var(--muted);font-size:12.5px;font-weight:550;margin-top:7px}
  .kpi.amber .n{color:var(--amber)}

  /* ---- Toolbar + table ---- */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .searchbox{position:relative;flex:1;max-width:340px}
  .searchbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .searchbox input{padding-left:36px}
  .count{color:var(--muted);font-size:12.5px;font-weight:600}
  .tbl-wrap{overflow:auto;max-height:calc(100vh - 240px);border-radius:var(--r)}
  table{width:100%;border-collapse:separate;border-spacing:0}
  thead th{position:sticky;top:0;background:#fbfcfd;z-index:1;text-align:left;padding:11px 16px;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--line)}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--line-2);font-size:13.5px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#fcfdfe}
  .id{font-weight:700;font-feature-settings:"tnum"} .sub-c{color:var(--muted);font-size:12px}
  .price{color:var(--accent-d);font-weight:800}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 8px;border-radius:999px;font-size:11.5px;font-weight:700;
    background:#eef1f5;color:var(--body)}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.85}
  .pill.green{background:var(--accent-l);color:var(--accent-d)} .pill.amber{background:var(--amber-l);color:var(--amber)}
  .pill.red{background:var(--red-l);color:var(--red)} .pill.grey{background:#eef1f5;color:var(--muted)}

  .thumb{width:48px;height:48px;border-radius:9px;object-fit:cover;border:1px solid var(--line);background:var(--line-2)}
  .thumbs{display:flex;gap:6px;margin:10px 0 2px}
  .minifield{display:flex;flex-direction:column;gap:5px} .minifield input,.minifield select{width:104px}
  .empty{text-align:center;color:var(--muted);padding:54px 20px}
  .empty .big{margin:0 auto 12px;width:52px;height:52px;border-radius:14px;background:var(--line-2);display:grid;place-items:center;color:var(--faint)}
  .skel{height:14px;border-radius:6px;background:linear-gradient(90deg,#eef1f5 25%,#f6f8fa 37%,#eef1f5 63%);background-size:400% 100%;animation:sh 1.2s infinite}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .review-card{padding:18px 20px;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);background:#fff}
  .review-card+.review-card{margin-top:14px}

  .switch{position:relative;display:inline-block;width:44px;height:25px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#d3dae3;border-radius:999px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:19px;width:19px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .switch input:checked+.slider{background:var(--accent)} .switch input:checked+.slider:before{transform:translateX(19px)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:11px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
    box-shadow:var(--sh-lg);font-weight:600;font-size:13px;display:flex;align-items:center;gap:9px;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)} .toast.err{background:var(--red)}
  .flex{display:flex} .between{justify-content:space-between} .center{align-items:center} .gap{gap:12px} .wrap{flex-wrap:wrap}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <div class="brand"><span class="mark" id="loginMark"></span> KANNI</div>
    <h1>Sign in to Admin</h1>
    <div class="sub">Operations console — listings, logistics, orders &amp; finance.</div>
    <form id="loginForm">
      <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" value="admin@kanni.com" /></div>
      <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
      <button type="submit" id="loginBtn">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
    <details class="adv"><summary>Advanced · API endpoint</summary>
      <div class="row"><input id="apiBaseInput" placeholder="https://kanni-api.onrender.com/api" /><button class="ghost sm" id="apiSave" type="button">Set</button></div>
    </details>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="appView">
  <aside class="sidebar">
    <div class="brand"><span class="mark" id="sideMark"></span> KANNI</div>
    <nav id="nav"></nav>
    <div class="side-foot"><span id="footDot">●</span> Connected · v1</div>
  </aside>
  <main>
    <header class="topbar">
      <div><h2 id="pageTitle">Dashboard</h2><div class="sub" id="pageSub"></div></div>
      <div class="right">
        <button class="icon" id="refreshBtn" title="Refresh"></button>
        <div class="whoami"><span class="avatar" id="avatar">A</span><div><div class="nm" id="whoami"></div><div class="rl">Administrator</div></div></div>
        <button class="ghost sm" id="logout">Sign out</button>
      </div>
    </header>
    <div class="content" id="panel"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);

/* ---------- icons (Feather-style line icons) ---------- */
const P = {
  leaf:'<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>',
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/>',
  tag:'<path d="M20.59 13.41 13.42 20.6a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/><circle cx="7" cy="7" r="1.2"/>',
  truck:'<path d="M10 17h4V5H2v12h3"/><path d="M14 9h4l4 4v4h-3"/><circle cx="7.5" cy="17.5" r="2"/><circle cx="17.5" cy="17.5" r="2"/>',
  box:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
  chart:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>',
  search:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  refresh:'<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
};
function ic(n,s=18){return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${P[n]||''}</svg>`}
$('#loginMark').innerHTML = ic('leaf',18); $('#sideMark').innerHTML = ic('leaf',18);
$('#refreshBtn').innerHTML = ic('refresh',17);

/* ---------- API base ---------- */
const params = new URLSearchParams(location.search);
const isLocal = (h)=>/^(localhost|127\.|0\.0\.0\.0|\[::1\])/.test(h||'');
const defaultApi = ()=> isLocal(location.hostname) ? 'http://localhost:3333/api'
  : location.origin.replace(/admin/i,'api').replace(/\/$/,'')+'/api';
let stored = localStorage.getItem('kanni_api');
if (stored && /localhost|127\.0\.0\.1/.test(stored) && !isLocal(location.hostname)) stored = null;
const API = (params.get('api') || stored || defaultApi()).replace(/\/$/,'');
const API_ORIGIN = API.replace(/\/api\/?$/,'');
const imageUrl = (p)=> !p ? '' : /^https?:\/\//.test(p) ? p : API_ORIGIN+p;
localStorage.setItem('kanni_api', API);
$('#apiBaseInput').value = API;
$('#apiSave').onclick = ()=>{ const v=$('#apiBaseInput').value.trim().replace(/\/$/,''); if(v){localStorage.setItem('kanni_api',v);location.href=location.pathname;} };

let token = localStorage.getItem('kanni_admin_token') || '';
let adminEmail = localStorage.getItem('kanni_admin_email') || '';
let tab = 'dashboard';
const q = { listings:'', drivers:'', orders:'', settlements:'', users:'', usersRole:'' };

function toast(msg,isErr){ const t=$('#toast'); t.innerHTML=msg; t.className='toast show'+(isErr?' err':''); clearTimeout(t._h); t._h=setTimeout(()=>t.className='toast',2600); }

async function api(path,opts={}){
  const res = await fetch(API+path,{...opts,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(opts.headers||{})}});
  const text = await res.text(); const data = text?JSON.parse(text):null;
  if(!res.ok){ const m=data&&(data.message||data.error); throw new Error(Array.isArray(m)?m.join(', '):m||res.statusText); }
  return data;
}

const buyerPrice=(p,m,f)=>Math.round((p*(1+m/100)+f)*100)/100;
const inr=(n)=>'₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
const esc=(s)=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const sid=(id)=>id?String(id).slice(0,8):'';
const pname=(n)=>n?(n.en||Object.values(n)[0]):'Produce';
function pill(status,label){ const s=(status||'').toLowerCase(); let c='grey';
  if(['live','delivered','settled','paid','captured','verified'].includes(s))c='green';
  else if(['pending','created','held','pickup_assigned','assigned','unassigned'].includes(s))c='amber';
  else if(['cancelled','rejected','refunded','failed'].includes(s))c='red';
  return `<span class="pill ${c}">${esc(label||status||'—')}</span>`; }
const filt=(arr,s,fields)=> !s?arr:arr.filter(o=>fields.some(f=>String(o[f]??'').toLowerCase().includes(s.toLowerCase())));

/* ---------- Login ---------- */
$('#loginForm').onsubmit = async (e)=>{
  e.preventDefault(); $('#loginErr').textContent=''; const b=$('#loginBtn'); b.disabled=true; b.textContent='Signing in…';
  try{
    const r = await api('/auth/admin/login',{method:'POST',body:JSON.stringify({email:$('#email').value.trim(),password:$('#password').value})});
    token=r.token; adminEmail=r.email||$('#email').value.trim();
    localStorage.setItem('kanni_admin_token',token); localStorage.setItem('kanni_admin_email',adminEmail);
    enterApp();
  }catch(err){ $('#loginErr').textContent=err.message; }
  finally{ b.disabled=false; b.textContent='Sign in'; }
};
$('#logout').onclick = ()=>{ token=''; localStorage.removeItem('kanni_admin_token'); $('#appView').classList.remove('show'); $('#loginView').style.display=''; };
function enterApp(){
  $('#loginView').style.display='none'; $('#appView').classList.add('show');
  $('#whoami').textContent=adminEmail; $('#avatar').textContent=(adminEmail[0]||'A').toUpperCase();
  buildNav(); loadAll();
}

/* ---------- Nav ---------- */
const NAV=[
  {sec:'Overview', items:[{id:'dashboard',label:'Dashboard',icon:'grid'}]},
  {sec:'Operations', items:[{id:'listings',label:'Listings',icon:'tag',badge:'listings'},{id:'drivers',label:'Drivers',icon:'truck',badge:'drivers'},{id:'orders',label:'Orders',icon:'box'}]},
  {sec:'People', items:[{id:'users',label:'Users',icon:'users'}]},
  {sec:'Finance', items:[{id:'settlements',label:'Settlements',icon:'chart'}]},
  {sec:'System', items:[{id:'settings',label:'Settings',icon:'gear'}]},
];
const TITLES={dashboard:['Dashboard','Live overview of the marketplace'],listings:['Listings','Review &amp; price farmer submissions'],drivers:['Drivers','Verify onboarding documents'],orders:['Orders','Track and resolve orders'],users:['Users','Monitor &amp; manage everyone on KANNI'],settlements:['Settlements','Money settled to farmers, drivers &amp; KANNI'],settings:['Settings','Platform configuration']};
function buildNav(){
  $('#nav').innerHTML = NAV.map(g=>`<div class="nav-sec">${g.sec}</div>`+g.items.map(it=>
    `<div class="nav-item ${it.id===tab?'active':''}" data-tab="${it.id}">${ic(it.icon)} <span>${it.label}</span>${it.badge?`<span class="nav-badge" data-badge="${it.badge}" style="display:none"></span>`:''}</div>`).join('')).join('');
  document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{
    tab=b.dataset.tab; document.querySelectorAll('.nav-item').forEach(x=>x.classList.toggle('active',x===b));
    const t=TITLES[tab]; $('#pageTitle').innerHTML=t[0]; $('#pageSub').innerHTML=t[1]; render();
  });
}
$('#refreshBtn').onclick=()=>loadAll();

/* ---------- Data ---------- */
const state={stats:null,listings:[],drivers:[],orders:[],users:[],settings:null,loading:true};
async function loadAll(){
  state.loading=true; render();
  try{
    const [stats,listings,drivers,orders,users,settings]=await Promise.all([
      api('/admin/stats'),api('/admin/listings'),api('/admin/drivers'),api('/admin/orders'),api('/admin/users').catch(()=>[]),api('/admin/settings').catch(()=>null)]);
    Object.assign(state,{stats,listings,drivers,orders,users,settings});
    setBadge('listings',listings.length); setBadge('drivers',drivers.length);
  }catch(e){ toast(e.message,true); if(/401|unauth/i.test(e.message)) $('#logout').onclick(); }
  finally{ state.loading=false; render(); }
}
function setBadge(key,n){ const el=document.querySelector(`[data-badge="${key}"]`); if(!el)return; if(n>0){el.textContent=n;el.style.display='';}else el.style.display='none'; }

/* ---------- Render ---------- */
function render(){
  if(state.loading && !state.stats){ $('#panel').innerHTML=`<div class="grid k4">${'<div class="kpi"><div class="ic"></div><div class="skel" style="width:60%"></div><div class="skel" style="width:80%;margin-top:10px"></div></div>'.repeat(4)}</div>`; return; }
  ({dashboard:dash,listings:listingsView,drivers:driversView,orders:ordersView,users:usersView,settlements:settleView,settings:settingsView}[tab]||dash)();
}
function kpi(icon,n,l,cls){ return `<div class="kpi ${cls||''}"><div class="ic">${ic(icon,18)}</div><div class="n">${n}</div><div class="l">${l}</div></div>`; }
function emptyState(msg){ return `<div class="card"><div class="empty"><div class="big">${ic('grid',22)}</div>${msg}</div></div>`; }
function toolbar(key,placeholder,count){
  return `<div class="toolbar"><div class="searchbox">${ic('search',16)}<input id="search" placeholder="${placeholder}" value="${esc(q[key])}"/></div><span class="count" id="count">${count}</span></div>`;
}

function dash(){
  const s=state.stats||{};
  $('#panel').innerHTML=`
    <div class="sec-title">Needs attention</div>
    <div class="grid k3">
      ${kpi('tag',s.pending_listings??0,'Listings awaiting review',(s.pending_listings>0?'amber':''))}
      ${kpi('users',s.pending_drivers??0,'Drivers to verify',(s.pending_drivers>0?'amber':''))}
      ${kpi('box',s.active_orders??0,'Orders in flight','blue')}
    </div>
    <div class="sec-title">Marketplace</div>
    <div class="grid k4">
      ${kpi('tag',s.live_listings??0,'Live listings')}
      ${kpi('box',s.total_orders??0,'Total orders')}
      ${kpi('chart',s.delivered_orders??0,'Delivered')}
      ${kpi('refresh',s.cancelled_orders??0,'Cancelled')}
    </div>
    <div class="sec-title">People</div>
    <div class="grid k4">
      ${kpi('users',s.total_users??0,'Total users')}
      ${kpi('tag',s.sellers??0,'Farmers')}
      ${kpi('box',s.buyers??0,'Buyers')}
      ${kpi('truck',s.drivers??0,'Drivers')}
    </div>
    <div class="sec-title">Finance (settled)</div>
    <div class="grid k4">
      ${kpi('chart',inr(s.gmv),'GMV')}
      ${kpi('chart',inr(s.kanni_revenue),'KANNI revenue')}
      ${kpi('users',inr(s.farmer_paid),'Paid to farmers')}
      ${kpi('truck',inr(s.driver_paid),'Paid to drivers')}
    </div>`;
}

function usersView(){
  const el=$('#panel');
  const roleSel=`<select id="roleFilter" style="width:148px;flex:0 0 auto">
    <option value="">All roles</option><option value="seller">Farmers</option><option value="buyer">Buyers</option><option value="driver">Drivers</option><option value="admin">Admins</option></select>`;
  el.innerHTML=`<div class="toolbar"><div class="searchbox">${ic('search',16)}<input id="search" placeholder="Search name, phone or email…" value="${esc(q.users)}"/></div>${roleSel}<span class="count" id="count"></span></div>
    <div class="card"><div class="tbl-wrap"><table><thead><tr><th>User</th><th>Role</th><th>Contact</th><th>Activity</th><th>Status</th><th>Joined</th><th></th></tr></thead><tbody id="rows"></tbody></table></div></div>`;
  const fill=()=>{
    let rows=filt(state.users,q.users,['name','phone','email']);
    if(q.usersRole) rows=rows.filter(u=>u.role===q.usersRole);
    $('#count').textContent=`${rows.length} of ${state.users.length}`;
    $('#rows').innerHTML = rows.length? rows.map(userRow).join('') : `<tr><td colspan="7"><div class="empty">No matching users.</div></td></tr>`;
    rows.forEach(wireUser);
  };
  $('#search').oninput=e=>{q.users=e.target.value;fill();};
  $('#roleFilter').value=q.usersRole; $('#roleFilter').onchange=e=>{q.usersRole=e.target.value;fill();};
  fill();
}
const ROLE_LABEL={seller:'Farmer',buyer:'Buyer',driver:'Driver',admin:'Admin'};
function userRow(u){
  const nm=u.name||'—', init=(nm!=='—'?nm[0]:(u.role||'?')[0]).toUpperCase();
  const activity = u.role==='seller'?`${u.listings_count} listing${u.listings_count==1?'':'s'}`
    : u.role==='buyer'?`${u.orders_count} order${u.orders_count==1?'':'s'}`
    : u.role==='driver'?(u.driver_status?`vehicle ${esc(u.vehicle_type||'')}`:'—') : '—';
  const status = u.blocked?'<span class="pill red">Blocked</span>'
    : u.role==='driver'&&u.driver_status?pill(u.driver_status)
    : '<span class="pill green">Active</span>';
  return `<tr data-user="${u.id}">
    <td><div class="flex center" style="gap:10px"><span class="avatar" style="width:30px;height:30px;font-size:12px">${esc(init)}</span><div><div style="font-weight:600">${esc(nm)}</div><div class="sub-c">#${sid(u.id)}</div></div></div></td>
    <td><span class="pill grey">${esc(ROLE_LABEL[u.role]||u.role||'—')}</span></td>
    <td>${esc(u.email||u.phone||'—')}</td>
    <td class="sub-c" style="text-transform:capitalize">${activity}</td>
    <td>${status}</td>
    <td class="sub-c">${new Date(u.created_at).toLocaleDateString('en-IN')}</td>
    <td style="text-align:right">${u.role!=='admin'?`<button class="sm ${u.blocked?'ghost':'danger'} u-block">${u.blocked?'Unblock':'Block'}</button>`:''}</td></tr>`;
}
function wireUser(u){
  const btn=document.querySelector(`[data-user="${u.id}"] .u-block`); if(!btn)return;
  btn.onclick=async()=>{
    const blocking=!u.blocked;
    if(blocking && !confirm(`Block ${u.name||u.phone||'this user'}? They won't be able to sign in.`))return;
    btn.disabled=true;
    try{ await api(`/admin/users/${u.id}/block`,{method:'POST',body:JSON.stringify({blocked:blocking})}); toast(blocking?'User blocked':'User unblocked'); loadAll(); }
    catch(e){ toast(e.message,true); btn.disabled=false; }
  };
}

function listingsView(){
  const el=$('#panel');
  const fill=()=>{
    const rows=filt(state.listings,q.listings,['seller_name']).filter(l=>!q.listings||pname(l.produce_names).toLowerCase().includes(q.listings.toLowerCase())||(l.seller_name||'').toLowerCase().includes(q.listings.toLowerCase()));
    $('#count').textContent=`${rows.length} pending`;
    $('#rows').innerHTML = rows.length? rows.map(l=>reviewCard(l)).join('') : emptyCardInner('All caught up — no listings to review.');
    rows.forEach(wireReview);
  };
  if(!state.listings.length){ el.innerHTML=toolbar('listings','Search produce or seller…','0 pending')+emptyCardInner('All caught up — no listings to review.'); $('#search').oninput=e=>{q.listings=e.target.value;}; return; }
  el.innerHTML=toolbar('listings','Search produce or seller…','')+`<div id="rows"></div>`;
  $('#search').oninput=e=>{q.listings=e.target.value;fill();};
  fill();
}
function emptyCardInner(msg){ return `<div class="card"><div class="empty"><div class="big">${ic('tag',22)}</div>${msg}</div></div>`; }
function reviewCard(l){
  const payout=Number(l.payout_price);
  return `<div class="review-card" data-listing="${l.id}">
    <div class="flex between" style="align-items:flex-start">
      <div><div style="font-weight:700;font-size:15px">${esc(pname(l.produce_names))} &nbsp;${pill('grade','Grade '+(l.grade||'?'))}</div>
      <div class="sub-c" style="margin-top:4px">${esc(l.seller_name||'Unknown seller')} · ${Number(l.qty)} ${esc(l.unit)} · MOQ ${Number(l.moq)} · payout ${inr(payout)}/${esc(l.unit)}</div></div>
      <div class="sub-c">#${sid(l.id)}</div>
    </div>
    ${(l.photos&&l.photos.length)?`<div class="thumbs">${l.photos.map(p=>`<img class="thumb" src="${imageUrl(p)}"/>`).join('')}</div>`:''}
    <div class="flex gap wrap" style="margin-top:15px;align-items:flex-end">
      <div class="minifield"><label>Grade</label><select class="f-grade">${['A','B','C'].map(g=>`<option ${g===(l.grade||'A')?'selected':''}>${g}</option>`).join('')}</select></div>
      <div class="minifield"><label>Margin %</label><input class="f-margin" type="number" min="0" step="0.5" value="10"/></div>
      <div class="minifield"><label>Flat fee ₹</label><input class="f-fee" type="number" min="0" step="0.5" value="0"/></div>
      <div class="minifield"><label>Buyer price</label><div class="price f-preview" style="padding:9px 0">${inr(buyerPrice(payout,10,0))}</div></div>
      <div style="flex:1"></div>
      <button class="f-approve">Approve &amp; go live</button>
      <button class="ghost f-reject">Reject</button>
    </div></div>`;
}
function wireReview(l){
  const card=$(`[data-listing="${l.id}"]`); if(!card)return; const payout=Number(l.payout_price);
  const upd=()=>{const m=Number(card.querySelector('.f-margin').value)||0,f=Number(card.querySelector('.f-fee').value)||0;card.querySelector('.f-preview').textContent=inr(buyerPrice(payout,m,f));};
  card.querySelector('.f-margin').oninput=upd; card.querySelector('.f-fee').oninput=upd;
  card.querySelector('.f-approve').onclick=async(e)=>{e.target.disabled=true;
    try{await api(`/admin/listings/${l.id}/review`,{method:'POST',body:JSON.stringify({action:'approve',grade:card.querySelector('.f-grade').value,marginPct:Number(card.querySelector('.f-margin').value)||0,flatFee:Number(card.querySelector('.f-fee').value)||0})});toast('Listing approved &amp; live');loadAll();}
    catch(err){toast(err.message,true);e.target.disabled=false;}};
  card.querySelector('.f-reject').onclick=async()=>{const reason=prompt('Reject reason?','Quality / pricing not acceptable');if(reason===null)return;
    try{await api(`/admin/listings/${l.id}/review`,{method:'POST',body:JSON.stringify({action:'reject',rejectReason:reason})});toast('Listing rejected');loadAll();}catch(err){toast(err.message,true);}};
}

function driversView(){
  const el=$('#panel');
  if(!state.drivers.length){ el.innerHTML=toolbar('drivers','Search phone…','0 pending')+`<div class="card"><div class="empty"><div class="big">${ic('truck',22)}</div>No drivers awaiting verification.</div></div>`; $('#search').oninput=e=>{q.drivers=e.target.value;}; return; }
  el.innerHTML=toolbar('drivers','Search phone…','')+`<div class="card"><div class="tbl-wrap"><table><thead><tr><th>Phone</th><th>Vehicle</th><th>Capacity</th><th style="text-align:right">Action</th></tr></thead><tbody id="rows"></tbody></table></div></div>`;
  const fill=()=>{ const rows=filt(state.drivers,q.drivers,['phone','vehicle_type']); $('#count').textContent=`${rows.length} pending`;
    $('#rows').innerHTML=rows.map(d=>`<tr data-driver="${d.user_id}"><td class="id">${esc(d.phone)}</td><td style="text-transform:capitalize">${esc((d.vehicle_type||'—').replace('_',' '))}</td><td>${Number(d.capacity_kg)} kg</td><td style="text-align:right"><button class="sm d-ok">Verify</button> <button class="sm ghost d-no">Reject</button></td></tr>`).join('');
    rows.forEach(d=>{const row=$(`[data-driver="${d.user_id}"]`);const act=async(a)=>{try{await api(`/admin/drivers/${d.user_id}/verify`,{method:'POST',body:JSON.stringify({approve:a})});toast(a?'Driver verified':'Driver rejected');loadAll();}catch(e){toast(e.message,true);}};row.querySelector('.d-ok').onclick=()=>act(true);row.querySelector('.d-no').onclick=()=>act(false);});
  };
  $('#search').oninput=e=>{q.drivers=e.target.value;fill();}; fill();
}

function ordersView(){
  const el=$('#panel');
  el.innerHTML=toolbar('orders','Search order id or buyer…','')+`<div class="card"><div class="tbl-wrap"><table><thead><tr><th>Order</th><th>Buyer</th><th>Total</th><th>Status</th><th>Payment</th><th>Settlement</th><th></th></tr></thead><tbody id="rows"></tbody></table></div></div>`;
  const fill=()=>{ const rows=filt(state.orders,q.orders,['id','buyer_name','status']); $('#count').textContent=`${rows.length} orders`;
    $('#rows').innerHTML = rows.length? rows.map(o=>`<tr data-order="${o.id}"><td><span class="id">#${sid(o.id)}</span><div class="sub-c">${new Date(o.created_at).toLocaleDateString('en-IN')}</div></td><td>${esc(o.buyer_name||'—')}</td><td style="font-weight:700">${inr(o.total)}</td><td>${pill(o.status)}</td><td>${pill(o.payment_status)}</td><td>${pill(o.settlement_status)}${o.kanni_margin?`<div class="sub-c">margin ${inr(o.kanni_margin)}</div>`:''}</td><td style="text-align:right">${o.refundable?'<button class="sm danger o-refund">Refund</button>':''}</td></tr>`).join('') : `<tr><td colspan="7"><div class="empty">No matching orders.</div></td></tr>`;
    rows.filter(o=>o.refundable).forEach(o=>{$(`[data-order="${o.id}"] .o-refund`).onclick=async(e)=>{const reason=prompt(`Refund order #${sid(o.id)} (${inr(o.total)})?\nReason:`,'Refunded by admin');if(reason===null)return;e.target.disabled=true;try{const r=await api(`/admin/orders/${o.id}/refund`,{method:'POST',body:JSON.stringify({reason})});toast(r.post_delivery?'Post-delivery refund issued':'Order cancelled &amp; refunded');loadAll();}catch(err){toast(err.message,true);e.target.disabled=false;}};});
  };
  $('#search').oninput=e=>{q.orders=e.target.value;fill();}; fill();
}

function settleView(){
  const el=$('#panel');
  const settled=state.orders.filter(o=>o.settlement_status==='settled');
  const revenue=settled.reduce((a,o)=>a+Number(o.kanni_margin||0),0);
  const s=state.stats||{};
  const head=`<div class="grid k3" style="margin-bottom:18px">
    ${kpi('chart',inr(s.kanni_revenue??revenue),'KANNI revenue')}
    ${kpi('users',inr(s.farmer_paid),'Paid to farmers')}
    ${kpi('truck',inr(s.driver_paid),'Paid to drivers')}</div>`;
  el.innerHTML=head+toolbar('settlements','Search order or buyer…','')+`<div class="card"><div class="tbl-wrap"><table><thead><tr><th>Order</th><th>Buyer</th><th>Gross</th><th>KANNI margin</th><th>Date</th></tr></thead><tbody id="rows"></tbody></table></div></div>`;
  const fill=()=>{ const rows=filt(settled,q.settlements,['id','buyer_name']); $('#count').textContent=`${rows.length} settled`;
    $('#rows').innerHTML = rows.length? rows.map(o=>`<tr><td class="id">#${sid(o.id)}</td><td>${esc(o.buyer_name||'—')}</td><td style="font-weight:600">${inr(o.total)}</td><td class="price">${inr(o.kanni_margin)}</td><td class="sub-c">${new Date(o.created_at).toLocaleDateString('en-IN')}</td></tr>`).join('') : `<tr><td colspan="5"><div class="empty">No settlements yet.</div></td></tr>`;
  };
  $('#search').oninput=e=>{q.settlements=e.target.value;fill();}; fill();
}

function settingsView(){
  const st=state.settings;
  if(!st){ $('#panel').innerHTML=emptyState('Settings unavailable.'); return; }
  const on=!!st.auto_approve;
  $('#panel').innerHTML=`
    <div class="card pad">
      <div class="flex between center"><div style="max-width:560px"><div style="font-weight:700;font-size:15px">Auto-approve listings</div>
      <div class="sub-c" style="margin-top:4px">When on, new farmer listings skip the review queue and go live immediately with the default margin/fee below.</div></div>
      <label class="switch"><input type="checkbox" id="autoToggle" ${on?'checked':''}/><span class="slider"></span></label></div>
      <div class="flex gap wrap" style="margin-top:20px;align-items:flex-end">
        <div class="minifield"><label>Default margin %</label><input id="setMargin" type="number" min="0" step="0.5" value="${Number(st.default_margin_pct)}"/></div>
        <div class="minifield"><label>Default flat fee ₹</label><input id="setFee" type="number" min="0" step="0.5" value="${Number(st.default_flat_fee)}"/></div>
        <div style="flex:1"></div><button class="ghost" id="setSave">Save defaults</button>
      </div>
    </div>
    <div class="card pad"><div style="font-weight:700;margin-bottom:8px">Account</div>
      <div class="sub-c">Signed in as <b style="color:var(--ink)">${esc(adminEmail)}</b></div>
      <div class="sub-c" style="margin-top:4px">API endpoint <code>${esc(API)}</code></div>
    </div>`;
  $('#autoToggle').onchange=async(e)=>{try{state.settings=await api('/admin/settings',{method:'POST',body:JSON.stringify({autoApprove:e.target.checked})});toast('Auto-approve '+(state.settings.auto_approve?'enabled':'disabled'));}catch(err){toast(err.message,true);e.target.checked=!e.target.checked;}};
  $('#setSave').onclick=async()=>{try{state.settings=await api('/admin/settings',{method:'POST',body:JSON.stringify({defaultMarginPct:Number($('#setMargin').value)||0,defaultFlatFee:Number($('#setFee').value)||0})});toast('Defaults saved');}catch(err){toast(err.message,true);}};
}

/* ---------- Boot ---------- */
if(token){ adminEmail=adminEmail||'admin'; enterApp(); }
</script>
</body>
</html>
