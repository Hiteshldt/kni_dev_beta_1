<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KANNI · Admin</title>
<style>
  :root {
    --green:#16a34a; --green-d:#15803d; --green-l:#dcfce7;
    --ink:#0f172a; --slate:#475569; --muted:#94a3b8; --line:#e2e8f0;
    --bg:#f1f5f9; --card:#ffffff; --amber:#b45309; --amber-l:#fef3c7;
    --red:#dc2626; --red-l:#fee2e2; --blue:#2563eb;
    --shadow:0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg:0 10px 30px rgba(15,23,42,.12);
    --sidebar:248px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font:14.5px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer;border:0;border-radius:10px;padding:9px 16px;font-weight:600;
         background:var(--green);color:#fff;transition:filter .15s, background .15s}
  button:hover{filter:brightness(1.05)}
  button:disabled{opacity:.55;cursor:default;filter:none}
  button.ghost{background:#fff;color:var(--slate);border:1px solid var(--line)}
  button.ghost:hover{background:#f8fafc}
  button.danger{background:var(--red)}
  button.sm{padding:6px 12px;font-size:13px;border-radius:8px}
  input,select{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
               background:#fff;color:var(--ink);width:100%}
  input:focus,select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-l)}
  label{font-size:12.5px;font-weight:600;color:var(--slate);display:block;margin-bottom:5px}
  a{color:var(--green-d);text-decoration:none}
  h1,h2,h3{margin:0}

  /* ---------- Login ---------- */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #e7f6ec 0%, var(--bg) 60%)}
  .login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:32px;box-shadow:var(--shadow-lg)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px;letter-spacing:-.3px}
  .brand .dot{font-size:24px}
  .login-card h1{font-size:21px;margin:18px 0 4px}
  .login-card .sub{color:var(--muted);margin-bottom:22px;font-size:13.5px}
  .field{margin-bottom:14px}
  .login-card button[type=submit]{width:100%;padding:12px;font-size:15px;margin-top:4px}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
  details.adv{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  details.adv summary{cursor:pointer;color:var(--muted);font-size:12.5px;list-style:none}
  details.adv summary::-webkit-details-marker{display:none}
  .adv .row{display:flex;gap:8px;margin-top:8px}

  /* ---------- App shell ---------- */
  .app{display:none;min-height:100vh}
  .app.show{display:grid;grid-template-columns:var(--sidebar) 1fr}
  .sidebar{background:#0b1220;color:#cbd5e1;padding:20px 16px;display:flex;flex-direction:column;gap:6px;
    position:sticky;top:0;height:100vh}
  .sidebar .logo{display:flex;align-items:center;gap:9px;color:#fff;font-weight:800;font-size:18px;
    padding:6px 10px 18px;letter-spacing:-.3px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:#94a3b8;
    font-weight:600;cursor:pointer;font-size:14px;transition:background .15s,color .15s}
  .nav-item .ic{width:20px;text-align:center;font-size:15px}
  .nav-item:hover{background:#16203a;color:#e2e8f0}
  .nav-item.active{background:var(--green);color:#fff}
  .nav-badge{margin-left:auto;background:var(--amber);color:#fff;font-size:11px;font-weight:800;
    min-width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
  .nav-item.active .nav-badge{background:rgba(255,255,255,.25)}
  .side-foot{margin-top:auto;color:#64748b;font-size:12px;padding:10px}

  main{min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(241,245,249,.85);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:14px}
  .topbar h2{font-size:18px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .whoami{display:flex;align-items:center;gap:8px;color:var(--slate);font-size:13.5px;font-weight:600}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;display:grid;
    place-items:center;font-weight:800;font-size:13px}
  .content{padding:24px 28px 60px;max-width:1100px;width:100%}

  /* ---------- Pieces ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;
    box-shadow:var(--shadow);margin-bottom:16px}
  .card-h{font-weight:700;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;gap:14px}
  .grid.k4{grid-template-columns:repeat(4,1fr)}
  .grid.k3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:880px){.grid.k4,.grid.k3{grid-template-columns:repeat(2,1fr)}
    .app.show{grid-template-columns:1fr}.sidebar{display:none}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .stat .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;margin-bottom:12px;
    background:var(--green-l)}
  .stat.warn .ic{background:var(--amber-l)}
  .stat .n{font-size:25px;font-weight:800;letter-spacing:-.5px}
  .stat .l{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:2px}
  .stat.warn .n{color:var(--amber)}

  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;
    background:#eef2f6;color:var(--slate)}
  .badge.green{background:var(--green-l);color:var(--green-d)}
  .badge.amber{background:var(--amber-l);color:var(--amber)}
  .badge.red{background:var(--red-l);color:var(--red)}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:12px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#f8fafc}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .muted{color:var(--muted)} .slate{color:var(--slate)}
  .thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;border:1px solid var(--line);background:#f1f5f9}
  .thumbs{display:flex;gap:6px;margin:8px 0}
  .minifield{display:flex;flex-direction:column;gap:4px}
  .minifield input,.minifield select{width:108px}
  .empty{text-align:center;color:var(--muted);padding:48px 0}
  .empty .big{font-size:40px;margin-bottom:8px}
  .price{color:var(--green-d);font-weight:800}

  /* toggle switch */
  .switch{position:relative;display:inline-block;width:46px;height:26px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#cbd5e1;border-radius:999px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:#fff;border-radius:50%;
    transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .switch input:checked+.slider{background:var(--green)}
  .switch input:checked+.slider:before{transform:translateX(20px)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 20px;border-radius:12px;opacity:0;transition:opacity .2s;pointer-events:none;
    box-shadow:var(--shadow-lg);font-weight:600;font-size:13.5px;max-width:90vw}
  .toast.show{opacity:1}.toast.err{background:var(--red)}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <div class="brand"><span class="dot">🌾</span> KANNI</div>
    <h1>Admin sign in</h1>
    <div class="sub">Operations console — manage listings, drivers, orders &amp; pricing.</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" autocomplete="username" value="admin@kanni.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" id="loginBtn">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
    <details class="adv">
      <summary>Advanced · API endpoint</summary>
      <div class="row">
        <input id="apiBaseInput" placeholder="https://kanni-api.onrender.com/api" />
        <button class="ghost sm" id="apiSave" type="button">Set</button>
      </div>
    </details>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="appView">
  <aside class="sidebar">
    <div class="logo">🌾 KANNI</div>
    <div class="nav-item active" data-tab="dashboard"><span class="ic">▦</span> Dashboard</div>
    <div class="nav-item" data-tab="listings"><span class="ic">🍅</span> Listings <span id="badgeListings"></span></div>
    <div class="nav-item" data-tab="drivers"><span class="ic">🚚</span> Drivers <span id="badgeDrivers"></span></div>
    <div class="nav-item" data-tab="orders"><span class="ic">📦</span> Orders</div>
    <div class="nav-item" data-tab="settings"><span class="ic">⚙️</span> Settings</div>
    <div class="side-foot">KANNI Admin · v1</div>
  </aside>
  <main>
    <header class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <div class="right">
        <button class="ghost sm" id="refreshBtn">↻ Refresh</button>
        <span class="whoami"><span class="avatar" id="avatar">A</span><span id="whoami"></span></span>
        <button class="ghost sm" id="logout">Log out</button>
      </div>
    </header>
    <div class="content" id="panel"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
const params = new URLSearchParams(location.search);

const isLocal = (h) => /^(localhost|127\.|0\.0\.0\.0|\[::1\])/.test(h || '');
function defaultApi() {
  if (isLocal(location.hostname)) return 'http://localhost:3333/api';
  return location.origin.replace(/admin/i, 'api').replace(/\/$/, '') + '/api';
}
let stored = localStorage.getItem('kanni_api');
if (stored && /localhost|127\.0\.0\.1/.test(stored) && !isLocal(location.hostname)) stored = null;
const API = (params.get('api') || stored || defaultApi()).replace(/\/$/, '');
const API_ORIGIN = API.replace(/\/api\/?$/, '');
const imageUrl = (p) => (!p ? '' : /^https?:\/\//.test(p) ? p : API_ORIGIN + p);
localStorage.setItem('kanni_api', API);
$('#apiBaseInput').value = API;
$('#apiSave').onclick = () => {
  const v = $('#apiBaseInput').value.trim().replace(/\/$/, '');
  if (v) { localStorage.setItem('kanni_api', v); location.href = location.pathname; }
};

let token = localStorage.getItem('kanni_admin_token') || '';
let adminEmail = localStorage.getItem('kanni_admin_email') || '';
let tab = 'dashboard';

function toast(msg, isErr) {
  const t = $('#toast'); t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._h); t._h = setTimeout(() => (t.className = 'toast'), 2600);
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...(opts.headers || {}) },
  });
  const text = await res.text();
  const data = text ? JSON.parse(text) : null;
  if (!res.ok) {
    const m = data && (data.message || data.error);
    throw new Error(Array.isArray(m) ? m.join(', ') : m || res.statusText);
  }
  return data;
}

const buyerPrice = (payout, m, f) => Math.round((payout * (1 + m / 100) + f) * 100) / 100;
const inr = (n) => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 2 });
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const shortId = (id) => (id ? String(id).slice(0, 8) : '');
const produceName = (names) => names ? (names.en || Object.values(names)[0]) : 'Produce';
function badge(status) {
  const s = (status || '').toLowerCase();
  let c = '';
  if (['live','delivered','settled','paid','captured','verified'].includes(s)) c = 'green';
  else if (['pending','created','held','pickup_assigned','assigned','unassigned'].includes(s)) c = 'amber';
  else if (['cancelled','rejected','refunded','failed'].includes(s)) c = 'red';
  return `<span class="badge ${c}">${esc(status || '—')}</span>`;
}

// ===== Login (email + password) =====
$('#loginForm').onsubmit = async (e) => {
  e.preventDefault();
  $('#loginErr').textContent = '';
  $('#loginBtn').disabled = true; $('#loginBtn').textContent = 'Signing in…';
  try {
    const r = await api('/auth/admin/login', {
      method: 'POST',
      body: JSON.stringify({ email: $('#email').value.trim(), password: $('#password').value }),
    });
    token = r.token; adminEmail = r.email || $('#email').value.trim();
    localStorage.setItem('kanni_admin_token', token);
    localStorage.setItem('kanni_admin_email', adminEmail);
    enterApp();
  } catch (err) {
    $('#loginErr').textContent = err.message;
  } finally {
    $('#loginBtn').disabled = false; $('#loginBtn').textContent = 'Sign in';
  }
};

$('#logout').onclick = () => {
  token = ''; localStorage.removeItem('kanni_admin_token');
  $('#appView').classList.remove('show'); $('#loginView').style.display = '';
};

function enterApp() {
  $('#loginView').style.display = 'none';
  $('#appView').classList.add('show');
  $('#whoami').textContent = adminEmail;
  $('#avatar').textContent = (adminEmail[0] || 'A').toUpperCase();
  loadAll();
}

// ===== Nav =====
const TITLES = { dashboard: 'Dashboard', listings: 'Listing review', drivers: 'Driver verification', orders: 'Orders', settings: 'Settings' };
document.querySelectorAll('.nav-item').forEach((b) => {
  b.onclick = () => {
    tab = b.dataset.tab;
    document.querySelectorAll('.nav-item').forEach((x) => x.classList.toggle('active', x === b));
    $('#pageTitle').textContent = TITLES[tab];
    render();
  };
});
$('#refreshBtn').onclick = () => loadAll();

// ===== Data =====
const state = { stats: null, listings: [], drivers: [], orders: [], settings: null, loading: true };

async function loadAll() {
  state.loading = true; render();
  try {
    const [stats, listings, drivers, orders, settings] = await Promise.all([
      api('/admin/stats'), api('/admin/listings'), api('/admin/drivers'), api('/admin/orders'),
      api('/admin/settings').catch(() => null),
    ]);
    Object.assign(state, { stats, listings, drivers, orders, settings });
    const lb = $('#badgeListings'), db = $('#badgeDrivers');
    lb.outerHTML = listings.length ? `<span class="nav-badge" id="badgeListings">${listings.length}</span>` : `<span id="badgeListings"></span>`;
    db.outerHTML = drivers.length ? `<span class="nav-badge" id="badgeDrivers">${drivers.length}</span>` : `<span id="badgeDrivers"></span>`;
  } catch (e) {
    toast(e.message, true);
    if (/401|unauth/i.test(e.message)) $('#logout').onclick();
  } finally { state.loading = false; render(); }
}

// ===== Render =====
function render() {
  if (state.loading && !state.stats) { $('#panel').innerHTML = `<div class="card"><div class="empty">Loading…</div></div>`; return; }
  ({ dashboard: renderDashboard, listings: renderListings, drivers: renderDrivers, orders: renderOrders, settings: renderSettings }[tab] || renderDashboard)();
}

function statCard(ic, n, l, warn) {
  return `<div class="stat ${warn && Number(n) > 0 ? 'warn' : ''}"><div class="ic">${ic}</div><div class="n">${n}</div><div class="l">${l}</div></div>`;
}

function renderDashboard() {
  const s = state.stats || {};
  $('#panel').innerHTML = `
    <div class="grid k3" style="margin-bottom:16px">
      ${statCard('📋', s.pending_listings ?? 0, 'Listings awaiting review', true)}
      ${statCard('🪪', s.pending_drivers ?? 0, 'Drivers to verify', true)}
      ${statCard('⏳', s.active_orders ?? 0, 'Orders in flight')}
    </div>
    <div class="card">
      <div class="card-h">Marketplace</div>
      <div class="grid k4">
        ${statCard('🟢', s.live_listings ?? 0, 'Live listings')}
        ${statCard('🧾', s.total_orders ?? 0, 'Total orders')}
        ${statCard('✅', s.delivered_orders ?? 0, 'Delivered')}
        ${statCard('✖️', s.cancelled_orders ?? 0, 'Cancelled')}
      </div>
    </div>
    <div class="card">
      <div class="card-h">Money (settled)</div>
      <div class="grid k4">
        ${statCard('💰', inr(s.gmv), 'GMV')}
        ${statCard('🏦', inr(s.kanni_revenue), 'KANNI revenue')}
        ${statCard('🧑‍🌾', inr(s.farmer_paid), 'Paid to farmers')}
        ${statCard('🚚', inr(s.driver_paid), 'Paid to drivers')}
      </div>
    </div>`;
}

function renderListings() {
  const el = $('#panel');
  if (!state.listings.length) { el.innerHTML = `<div class="card"><div class="empty"><div class="big">🎉</div>No listings awaiting review.</div></div>`; return; }
  el.innerHTML = state.listings.map((l) => {
    const payout = Number(l.payout_price);
    return `<div class="card" data-listing="${l.id}">
      <div class="row" style="justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:700;font-size:15px">${esc(produceName(l.produce_names))} ${badge('grade ' + (l.grade || '?'))}</div>
          <div class="muted" style="margin-top:3px">${esc(l.seller_name || 'Unknown seller')} · ${Number(l.qty)} ${esc(l.unit)} · MOQ ${Number(l.moq)} · payout ${inr(payout)}/${esc(l.unit)}</div>
        </div>
        <div class="muted">#${shortId(l.id)}</div>
      </div>
      ${(l.photos && l.photos.length) ? `<div class="thumbs">${l.photos.map((p) => `<img class="thumb" src="${imageUrl(p)}" />`).join('')}</div>` : ''}
      <div class="row" style="margin-top:14px">
        <div class="minifield"><label>Grade</label><select class="f-grade">${['A','B','C'].map((g) => `<option ${g === (l.grade || 'A') ? 'selected' : ''}>${g}</option>`).join('')}</select></div>
        <div class="minifield"><label>Margin %</label><input class="f-margin" type="number" min="0" step="0.5" value="10" /></div>
        <div class="minifield"><label>Flat fee ₹</label><input class="f-fee" type="number" min="0" step="0.5" value="0" /></div>
        <div class="minifield"><label>Buyer price</label><div class="price f-preview" style="padding:9px 0">${inr(buyerPrice(payout, 10, 0))}</div></div>
        <div style="flex:1"></div>
        <button class="f-approve">Approve &amp; go live</button>
        <button class="ghost f-reject">Reject</button>
      </div>
    </div>`;
  }).join('');

  state.listings.forEach((l) => {
    const card = $(`[data-listing="${l.id}"]`), payout = Number(l.payout_price);
    const upd = () => {
      const m = Number(card.querySelector('.f-margin').value) || 0, f = Number(card.querySelector('.f-fee').value) || 0;
      card.querySelector('.f-preview').textContent = inr(buyerPrice(payout, m, f));
    };
    card.querySelector('.f-margin').oninput = upd; card.querySelector('.f-fee').oninput = upd;
    card.querySelector('.f-approve').onclick = async (e) => {
      e.target.disabled = true;
      try {
        await api(`/admin/listings/${l.id}/review`, { method: 'POST', body: JSON.stringify({
          action: 'approve', grade: card.querySelector('.f-grade').value,
          marginPct: Number(card.querySelector('.f-margin').value) || 0,
          flatFee: Number(card.querySelector('.f-fee').value) || 0,
        }) });
        toast('Listing approved & live'); loadAll();
      } catch (err) { toast(err.message, true); e.target.disabled = false; }
    };
    card.querySelector('.f-reject').onclick = async () => {
      const reason = prompt('Reject reason?', 'Quality / pricing not acceptable');
      if (reason === null) return;
      try { await api(`/admin/listings/${l.id}/review`, { method: 'POST', body: JSON.stringify({ action: 'reject', rejectReason: reason }) }); toast('Listing rejected'); loadAll(); }
      catch (err) { toast(err.message, true); }
    };
  });
}

function renderDrivers() {
  const el = $('#panel');
  if (!state.drivers.length) { el.innerHTML = `<div class="card"><div class="empty"><div class="big">🎉</div>No drivers awaiting verification.</div></div>`; return; }
  el.innerHTML = `<div class="card"><table>
    <thead><tr><th>Phone</th><th>Vehicle</th><th>Capacity</th><th style="text-align:right">Action</th></tr></thead>
    <tbody>${state.drivers.map((d) => `<tr data-driver="${d.user_id}">
      <td style="font-weight:600">${esc(d.phone)}</td><td>${esc(d.vehicle_type || '—')}</td><td>${Number(d.capacity_kg)} kg</td>
      <td style="text-align:right"><button class="sm d-ok">Verify</button> <button class="sm ghost d-no">Reject</button></td></tr>`).join('')}</tbody></table></div>`;
  state.drivers.forEach((d) => {
    const row = $(`[data-driver="${d.user_id}"]`);
    const act = async (approve) => { try { await api(`/admin/drivers/${d.user_id}/verify`, { method: 'POST', body: JSON.stringify({ approve }) }); toast(approve ? 'Driver verified' : 'Driver rejected'); loadAll(); } catch (e) { toast(e.message, true); } };
    row.querySelector('.d-ok').onclick = () => act(true);
    row.querySelector('.d-no').onclick = () => act(false);
  });
}

function renderOrders() {
  const el = $('#panel');
  if (!state.orders.length) { el.innerHTML = `<div class="card"><div class="empty">No orders yet.</div></div>`; return; }
  el.innerHTML = `<div class="card"><table>
    <thead><tr><th>Order</th><th>Buyer</th><th>Total</th><th>Status</th><th>Payment</th><th>Settlement</th><th></th></tr></thead>
    <tbody>${state.orders.map((o) => `<tr data-order="${o.id}">
      <td><span style="font-weight:700">#${shortId(o.id)}</span><div class="muted" style="font-size:12px">${new Date(o.created_at).toLocaleDateString('en-IN')}</div></td>
      <td>${esc(o.buyer_name || '—')}</td><td style="font-weight:600">${inr(o.total)}</td>
      <td>${badge(o.status)}</td><td>${badge(o.payment_status)}</td>
      <td>${badge(o.settlement_status)}${o.kanni_margin ? `<div class="muted" style="font-size:12px">margin ${inr(o.kanni_margin)}</div>` : ''}</td>
      <td style="text-align:right">${o.refundable ? '<button class="sm danger o-refund">Refund</button>' : ''}</td></tr>`).join('')}</tbody></table></div>`;
  state.orders.filter((o) => o.refundable).forEach((o) => {
    $(`[data-order="${o.id}"] .o-refund`).onclick = async (e) => {
      const reason = prompt(`Refund order #${shortId(o.id)} (${inr(o.total)})?\nReason:`, 'Refunded by admin');
      if (reason === null) return;
      e.target.disabled = true;
      try { const r = await api(`/admin/orders/${o.id}/refund`, { method: 'POST', body: JSON.stringify({ reason }) }); toast(r.post_delivery ? 'Post-delivery refund issued' : 'Order cancelled & refunded'); loadAll(); }
      catch (err) { toast(err.message, true); e.target.disabled = false; }
    };
  });
}

function renderSettings() {
  const st = state.settings;
  if (!st) { $('#panel').innerHTML = `<div class="card"><div class="empty">Settings unavailable.</div></div>`; return; }
  const on = !!st.auto_approve;
  $('#panel').innerHTML = `
    <div class="card">
      <div class="card-h">Listing review</div>
      <div class="row" style="justify-content:space-between;align-items:center">
        <div style="max-width:560px">
          <div style="font-weight:600">Auto-approve listings</div>
          <div class="muted" style="margin-top:3px">When on, new farmer listings skip the review queue and go live immediately with the default margin/fee below.</div>
        </div>
        <label class="switch"><input type="checkbox" id="autoToggle" ${on ? 'checked' : ''}/><span class="slider"></span></label>
      </div>
      <div class="row" style="margin-top:18px">
        <div class="minifield"><label>Default margin %</label><input id="setMargin" type="number" min="0" step="0.5" value="${Number(st.default_margin_pct)}" /></div>
        <div class="minifield"><label>Default flat fee ₹</label><input id="setFee" type="number" min="0" step="0.5" value="${Number(st.default_flat_fee)}" /></div>
        <div style="flex:1"></div>
        <button class="ghost" id="setSave">Save defaults</button>
      </div>
    </div>
    <div class="card">
      <div class="card-h">Account</div>
      <div class="muted">Signed in as <b style="color:var(--ink)">${esc(adminEmail)}</b>. API: <code>${esc(API)}</code></div>
    </div>`;
  $('#autoToggle').onchange = async (e) => {
    try { state.settings = await api('/admin/settings', { method: 'POST', body: JSON.stringify({ autoApprove: e.target.checked }) }); toast('Auto-approve ' + (state.settings.auto_approve ? 'enabled' : 'disabled')); }
    catch (err) { toast(err.message, true); e.target.checked = !e.target.checked; }
  };
  $('#setSave').onclick = async () => {
    try { state.settings = await api('/admin/settings', { method: 'POST', body: JSON.stringify({ defaultMarginPct: Number($('#setMargin').value) || 0, defaultFlatFee: Number($('#setFee').value) || 0 }) }); toast('Defaults saved'); }
    catch (err) { toast(err.message, true); }
  };
}

// ===== Boot =====
if (token) { adminEmail = adminEmail || 'admin'; enterApp(); }
</script>
</body>
</html>
